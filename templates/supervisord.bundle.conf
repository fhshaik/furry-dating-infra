[supervisord]
nodaemon=true

[program:backend]
command=/bin/sh -lc 'cd /app/backend && uvicorn app.main:app --host 127.0.0.1 --port 8000'
directory=/app/backend
user=appuser
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g 'daemon off;'
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
